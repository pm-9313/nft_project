name: CI

on:
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_COLLAB_CHAIN_ID: ${{ vars.NEXT_PUBLIC_COLLAB_CHAIN_ID }}
          NEXT_PUBLIC_GOOGLE_ANALYTICS_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_ANALYTICS_ID }}
          RECOIL_DUPLICATE_ATOM_KEY_CHECKING_ENABLED: ${{ vars.RECOIL_DUPLICATE_ATOM_KEY_CHECKING_ENABLED }}
          NEXT_PUBLIC_NEST_API_PREFIX: ${{ vars.NEXT_PUBLIC_NEST_API_PREFIX }}
          NEXT_PUBLIC_API_PREFIX: ${{ vars.NEXT_PUBLIC_API_PREFIX }}